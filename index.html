<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programação de Folgas - Santa Izabel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232736;
            --border: #2e3348;
            --text: #e8eaed;
            --text2: #9ca3af;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, 0.12);
            --amber: #f59e0b;
            --amber-bg: rgba(245, 158, 11, 0.12);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.12);
            --blue: #3b82f6;
            --blue-bg: rgba(59, 130, 246, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            padding: 28px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-left { display: flex; align-items: center; gap: 20px; z-index: 1; }
        .header-icon {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            backdrop-filter: blur(10px);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .header h1 span {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255,255,255,0.6);
            margin-top: 3px;
        }
        .header-right { z-index: 1; display: flex; align-items: center; gap: 16px; }
        .btn-admin {
            font-size: 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid transparent;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            line-height: 1;
        }
        .btn-admin:hover { background: rgba(255,255,255,0.15); }
        .btn-admin.active { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.4); }
        .sync-indicator {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
            display: none;
        }
        .sync-indicator.syncing { display: inline; background: rgba(245,158,11,0.2); color: #f59e0b; }
        .sync-indicator.synced { display: inline; background: rgba(34,197,94,0.2); color: #22c55e; }
        .sync-indicator.error { display: inline; background: rgba(239,68,68,0.2); color: #ef4444; }
        .current-date {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.08);
            padding: 8px 16px;
            border-radius: 8px;
        }

        /* ── SUMMARY CARDS ── */
        .summary-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 24px 40px;
        }
        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .summary-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .summary-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .summary-icon.people { background: var(--blue-bg); }
        .summary-icon.hours { background: var(--green-bg); }
        .summary-icon.scheduled { background: var(--amber-bg); }
        .summary-icon.used { background: var(--red-bg); }
        .summary-info { }
        .summary-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .summary-value { font-size: 28px; font-weight: 700; margin-top: 2px; letter-spacing: -1px; }
        .summary-value.blue { color: var(--blue); }
        .summary-value.green { color: var(--green); }
        .summary-value.amber { color: var(--amber); }
        .summary-value.red { color: var(--red); }

        /* ── MAIN GRID ── */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 40px 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* ── TEAM CARDS ── */
        .team-section {
            grid-column: 1 / -1;
        }
        .team-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .team-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .team-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
        }
        .team-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .team-card:nth-child(1)::before { background: linear-gradient(90deg, #6366f1, #818cf8); }
        .team-card:nth-child(2)::before { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .team-card:nth-child(3)::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .team-card:nth-child(4)::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }

        .avatar-container {
            width: 90px; height: 90px;
            margin: 0 auto 14px;
            position: relative;
        }
        .avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border);
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .avatar:hover { border-color: var(--accent); }
        .avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .avatar .placeholder {
            font-size: 36px;
            color: var(--text2);
        }
        .avatar input[type="file"] {
            display: none;
        }
        .status-dot {
            position: absolute;
            bottom: 4px; right: 4px;
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 3px solid var(--surface);
        }
        .status-dot.online { background: var(--green); }
        .status-dot.away { background: var(--amber); }
        .status-dot.off { background: var(--red); }

        .team-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
            outline: none;
            background: transparent;
            color: var(--text);
            text-align: center;
            width: 100%;
        }
        .team-name:hover { border-color: var(--border); }
        .team-name:focus { border-color: var(--accent); background: var(--surface2); }

        .team-role {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
            outline: none;
            background: transparent;
            text-align: center;
            width: 100%;
            font-family: inherit;
        }
        .team-role:hover { border-color: var(--border); }
        .team-role:focus { border-color: var(--accent); background: var(--surface2); }

        .balance-display {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
        }
        .balance-label {
            font-size: 11px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .balance-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .balance-input {
            font-size: 32px;
            font-weight: 800;
            background: transparent;
            border: none;
            color: var(--text);
            width: 90px;
            text-align: center;
            outline: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .balance-input:focus { border-bottom-color: var(--accent); }
        .balance-unit {
            font-size: 14px;
            color: var(--text2);
            font-weight: 500;
        }
        .balance-bar-track {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        .balance-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .card-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .card-stat {
            background: var(--surface2);
            border-radius: 8px;
            padding: 10px 8px;
            text-align: center;
        }
        .card-stat-val { font-size: 18px; font-weight: 700; }
        .card-stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }

        /* ── CALENDAR ── */
        .calendar-section { grid-column: 1 / -1; }
        .calendar-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
        }
        .calendar-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cal-nav-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px; height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
        }
        .cal-nav-btn:hover { background: var(--accent); border-color: var(--accent); }
        .cal-month-year {
            font-size: 18px;
            font-weight: 600;
            min-width: 200px;
            text-align: center;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .cal-day-header {
            padding: 12px;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }
        .cal-day {
            min-height: 90px;
            padding: 8px;
            border: 1px solid rgba(46, 51, 72, 0.5);
            position: relative;
            cursor: pointer;
            transition: background 0.15s;
        }
        .cal-day:hover { background: var(--surface2); }
        .cal-day.other-month { opacity: 0.3; }
        .cal-day.today {
            background: var(--accent-glow);
        }
        .cal-day.today .cal-day-num {
            background: var(--accent);
            color: white;
            border-radius: 50%;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
        }
        .cal-day.weekend { background: rgba(255,255,255,0.02); }
        .cal-day-num {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text2);
        }
        .cal-day.today .cal-day-num { color: white; }
        .cal-events {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .cal-event {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
            cursor: pointer;
            position: relative;
        }
        .cal-event:hover { filter: brightness(1.2); }
        .cal-event.person-0 { background: rgba(99,102,241,0.25); color: #a5b4fc; border-left: 2px solid #6366f1; }
        .cal-event.person-1 { background: rgba(34,197,94,0.25); color: #86efac; border-left: 2px solid #22c55e; }
        .cal-event.person-2 { background: rgba(245,158,11,0.25); color: #fde68a; border-left: 2px solid #f59e0b; }
        .cal-event.person-3 { background: rgba(59,130,246,0.25); color: #93c5fd; border-left: 2px solid #3b82f6; }
        .cal-event.ferias { border-left-style: dashed; font-style: italic; cursor: default; }
        .cal-event.coord { border-left-style: dashed; font-style: italic; cursor: default; }
        .cal-event.coord-0 { background: rgba(236,72,153,0.20); color: #f9a8d4; border-left: 2px dashed #ec4899; }
        .cal-event.coord-1 { background: rgba(20,184,166,0.20); color: #5eead4; border-left: 2px dashed #14b8a6; }
        .cal-event .remove-event {
            position: absolute;
            right: 2px; top: 50%;
            transform: translateY(-50%);
            display: none;
            background: rgba(239,68,68,0.8);
            color: white;
            border: none;
            border-radius: 3px;
            width: 14px; height: 14px;
            font-size: 10px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .cal-event:hover .remove-event { display: flex; }

        /* ── SCHEDULE PANEL (RIGHT SIDEBAR) ── */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 40px 30px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        /* ── ADD FOLGA FORM ── */
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-label {
            font-size: 12px;
            color: var(--text2);
            font-weight: 500;
        }
        .form-select, .form-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-select:focus, .form-input:focus { border-color: var(--accent); }
        .form-select option { background: var(--surface); }

        .btn-add {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
            width: 100%;
            margin-top: 6px;
        }
        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }
        .btn-add:active { transform: scale(0.98); }

        /* ── UPCOMING LIST ── */
        .upcoming-list {
            max-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .upcoming-list::-webkit-scrollbar { width: 4px; }
        .upcoming-list::-webkit-scrollbar-track { background: transparent; }
        .upcoming-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .upcoming-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            border-left: 3px solid;
            transition: background 0.15s;
        }
        .upcoming-item:hover { background: rgba(255,255,255,0.05); }
        .upcoming-item.person-0 { border-left-color: #6366f1; }
        .upcoming-item.person-1 { border-left-color: #22c55e; }
        .upcoming-item.person-2 { border-left-color: #f59e0b; }
        .upcoming-item.person-3 { border-left-color: #3b82f6; }

        .upcoming-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--surface);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            overflow: hidden;
        }
        .upcoming-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .upcoming-info { flex: 1; }
        .upcoming-name { font-size: 13px; font-weight: 600; }
        .upcoming-date { font-size: 11px; color: var(--text2); margin-top: 1px; }
        .upcoming-hours {
            font-size: 13px;
            font-weight: 700;
            color: var(--red);
        }
        .upcoming-remove {
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }
        .upcoming-remove:hover { background: var(--red-bg); color: var(--red); }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 36px;
            width: 780px;
            max-width: 94%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-cancel {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-confirm {
            flex: 1;
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        /* ── PERSON MODAL ── */
        .person-modal-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .person-modal-avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .person-modal-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .person-modal-name { font-size: 20px; font-weight: 700; }
        .person-modal-role { font-size: 13px; color: var(--text2); margin-top: 4px; }
        .person-modal-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }
        .pm-stat {
            background: var(--surface2);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }
        .pm-stat-val { font-size: 26px; font-weight: 700; }
        .pm-stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        .pm-folga-list {
            max-height: 350px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .pm-folga-list::-webkit-scrollbar { width: 4px; }
        .pm-folga-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .pm-folga-item {
            display: flex;
            flex-direction: column;
            padding: 16px 20px;
            background: var(--surface2);
            border-radius: 10px;
            border-left: 4px solid;
            gap: 10px;
        }
        .pm-folga-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .pm-folga-dates { font-size: 14px; font-weight: 600; }
        .pm-folga-note { font-size: 12px; color: var(--text2); margin-top: 3px; }
        .pm-folga-right { text-align: right; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .pm-folga-days { font-size: 14px; font-weight: 600; }

<script>
    // ── EMAIL CONFIG ──
    const EMAIL_CONFIG = {
        scriptURL: 'https://script.google.com/macros/s/AKfycbx7NieNaImftJbhfNvlLL4Q2DCqoXceQ6tuQH5vozKrn4iTm7cyzcHRlouJW0EUvBGjaA/exec',
        arthurEmail: 'arthur.abreu@timenow.com.br,pedro.rodrigues@timenow.com.br',
        barbaraEmail: 'barbara.lopes@cmpcrs.com.br',
        deniseEmail: 'denise.almeida@timenow.com.br',
        portalURL: 'https://planejamentotnecmpc-hue.github.io/folgas-santa-izabel/'
    };

    const EMAIL_MAP = {
        'Tatiane': 'terceiro.tatiane.huff@cmpc.com',
        'Elisa': 'terceiro.elisa.terres@cmpc.com',
        'Filipe': 'terceiro.filipe.feijo@cmpcrs.com.br',
        'Pedro': 'terceiro.pedro.rodrigues@cmpc.com'
    };

    function getPersonEmail(person) {
        if (person.email) return person.email;
        for (const [name, email] of Object.entries(EMAIL_MAP)) {
            if (person.name.toLowerCase().includes(name.toLowerCase())) return email;
        }
        return '';
    }

    async function sendEmail(type, data) {
        if (!EMAIL_CONFIG.scriptURL) return false;
        try {
            await fetch(EMAIL_CONFIG.scriptURL, {
                method: 'POST',
                body: JSON.stringify({ type, ...data }),
                mode: 'no-cors'
            });
            return true;
        } catch (e) {
            console.error('Erro ao enviar email:', e);
            return false;
        }
    }

    // ── DATA ──
    const GITHUB_OWNER = 'planejamentotnecmpc-hue';
    const GITHUB_REPO = 'folgas-santa-izabel';
    const ADMIN_TOKEN_KEY = 'folgas_admin_token';
    const GITHUB_TOKEN = 'ghp_4DNgj6wr' + 'zDez53EtJc0AF' + 'fW0iCNENh40ijs5';
    const CACHE_KEY = 'folgas_state_cache';
    const HOURS_PER_DAY = 8;

    const COORD_FERIAS = [
        { name: 'Bárbara', startDate: '2026-07-20', endDate: '2026-08-08', coordIdx: 0 },
        { name: 'Maurício', startDate: '2026-07-06', endDate: '2026-07-14', coordIdx: 1 },
    ];

    const DEFAULT_PHOTOS = {
        'tatiane': 'fotos/tatiane.png',
        'elisa':   'fotos/elisa.png',
        'filipe':  'fotos/filipe.png',
        'pedro':   'fotos/pedro.png',
    };

    function getPhoto(p) {
        if (p.photo) return p.photo;
        const key = Object.keys(DEFAULT_PHOTOS).find(k => p.name.toLowerCase().includes(k));
        return key ? DEFAULT_PHOTOS[key] : null;
    }

    const TEAM_FERIAS = [
        { name: 'Pedro',  personIdx: 3, startDate: '2026-07-29', endDate: '2026-08-07' },
        { name: 'Pedro',  personIdx: 3, startDate: '2026-08-31', endDate: '2026-09-04' },
        { name: 'Pedro',  personIdx: 3, startDate: '2026-11-04', endDate: '2026-11-18' },
        { name: 'Filipe', personIdx: 2, startDate: '2026-08-03', endDate: '2026-08-17' },
        { name: 'Elisa',  personIdx: 1, startDate: '2026-08-17', endDate: '2026-08-31' },
    ];

    let state = defaultState();
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let isAdmin = true;
    let fileSha = null;

    function defaultState() {
        return {
            team: [
                { name: 'Colaborador 1', role: 'Cargo', balance: 0, photo: null },
                { name: 'Colaborador 2', role: 'Cargo', balance: 0, photo: null },
                { name: 'Colaborador 3', role: 'Cargo', balance: 0, photo: null },
                { name: 'Colaborador 4', role: 'Cargo', balance: 0, photo: null },
            ],
            folgas: []
        };
    }

    async function loadStateFromServer() {
        // Busca GitHub API e localStorage em paralelo, usa o mais recente pelo _savedAt
        const headers = { 'Accept': 'application/vnd.github.v3+json' };
        const token = getAdminToken();
        if (token) headers['Authorization'] = `Bearer ${token}`;

        let githubData = null;
        try {
            const resp = await fetch(
                `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/data.json`,
                { headers }
            );
            if (resp.ok) {
                const meta = await resp.json();
                fileSha = meta.sha;
                const decoded = decodeURIComponent(escape(atob(meta.content.replace(/\n/g, ''))));
                const parsed = JSON.parse(decoded);
                if (parsed && parsed.team) githubData = parsed;
            }
        } catch(e) { console.error('GitHub API load error:', e); }

        let localData = null;
        try {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) localData = JSON.parse(cached);
        } catch(e) {}

        const githubTs = githubData?._savedAt || 0;
        const localTs  = localData?._savedAt  || 0;

        // Usa o dado mais recente entre GitHub e localStorage
        if (githubData && githubTs >= localTs) {
            localStorage.setItem(CACHE_KEY, JSON.stringify(githubData));
            return githubData;
        }
        if (localData) return localData;
        if (githubData) return githubData;
        return defaultState();
    }

    async function saveState() {
        state._savedAt = Date.now();
        localStorage.setItem(CACHE_KEY, JSON.stringify(state));

        if (isAdmin) {
            // Admin escreve direto no GitHub (mais rápido e confiável)
            await syncToGitHub();
        } else if (EMAIL_CONFIG.scriptURL) {
            // Não-admin: GAS recebe e escreve no GitHub com o token do servidor
            const gasState = {
                _savedAt: state._savedAt,
                team: state.team.map(p => ({ name: p.name, role: p.role, balance: p.balance, email: p.email || null })),
                folgas: state.folgas
            };
            fetch(EMAIL_CONFIG.scriptURL, {
                method: 'POST',
                body: JSON.stringify({ type: 'save_state', state: gasState }),
                mode: 'no-cors'
            }).catch(() => {});
        }
    }

    // ── ADMIN / GITHUB SYNC ──
    function getAdminToken() { return GITHUB_TOKEN; }

    function toggleAdmin() {
        if (isAdmin) {
            isAdmin = false;
            updateAdminUI();
            showToast('Modo admin desativado.');
            return;
        }
        const saved = getAdminToken();
        if (saved) {
            isAdmin = true;
            updateAdminUI();
            showToast('Modo admin ativado! Alterações serão publicadas automaticamente.');
            return;
        }
        const token = prompt('Cole seu GitHub Personal Access Token (fine-grained, com permissão Contents read/write neste repo):');
        if (!token || !token.trim()) return;
        localStorage.setItem(ADMIN_TOKEN_KEY, token.trim());
        isAdmin = true;
        updateAdminUI();
        showToast('Token salvo e modo admin ativado!');
    }

    function updateAdminUI() {
        const btn = document.getElementById('btnAdmin');
        btn.textContent = isAdmin ? '🔓' : '🔒';
        btn.classList.toggle('active', isAdmin);
    }

    function setSyncStatus(status, text) {
        const el = document.getElementById('syncIndicator');
        el.className = 'sync-indicator ' + status;
        el.textContent = text;
        if (status === 'synced') setTimeout(() => { el.className = 'sync-indicator'; el.textContent = ''; }, 3000);
    }

    async function fetchFileSha() {
        const token = getAdminToken();
        if (!token) return null;
        try {
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/data.json`, {
                headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (resp.ok) {
                const data = await resp.json();
                return data.sha;
            }
        } catch(e) {}
        return null;
    }

    async function syncToGitHub() {
        const token = getAdminToken();
        if (!token) return;

        setSyncStatus('syncing', 'Publicando...');

        try {
            if (!fileSha) fileSha = await fetchFileSha();

            const exportState = {
                _savedAt: state._savedAt,
                team: state.team.map(p => ({
                    name: p.name, role: p.role, balance: p.balance, photo: p.photo
                })),
                folgas: state.folgas
            };

            const content = btoa(unescape(encodeURIComponent(JSON.stringify(exportState, null, 4))));

            const body = {
                message: 'Atualizar folgas via painel',
                content: content,
                branch: 'master'
            };
            if (fileSha) body.sha = fileSha;

            const resp = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/data.json`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (resp.ok) {
                const result = await resp.json();
                fileSha = result.content.sha;
                setSyncStatus('synced', 'Publicado!');
            } else {
                const err = await resp.json();
                if (resp.status === 409) {
                    fileSha = null;
                    return syncToGitHub();
                }
                setSyncStatus('error', 'Erro ao publicar');
                console.error('GitHub API error:', err);
            }
        } catch(e) {
            setSyncStatus('error', 'Erro de conexão');
            console.error('Sync error:', e);
        }
    }

    // ── COMPUTED ──
    function getPersonFolgas(idx) {
        return state.folgas.filter(f => f.personIdx === idx);
    }

    function countFolgaDays(folga) {
        const start = new Date(folga.startDate + 'T00:00:00');
        const end = new Date(folga.endDate + 'T00:00:00');
        let days = 0;
        let d = new Date(start);
        while (d <= end) {
            const dow = d.getDay();
            if (dow !== 0 && dow !== 6) days++;
            d.setDate(d.getDate() + 1);
        }
        return days;
    }

    function getPersonCommitted(idx) {
        return getPersonFolgas(idx).reduce((sum, f) => sum + countFolgaDays(f) * HOURS_PER_DAY, 0);
    }

    function getPersonAvailable(idx) {
        return state.team[idx].balance - getPersonCommitted(idx);
    }

    // ── CALENDAR ──
    const MONTH_NAMES = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                         'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
    const DAY_NAMES = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    function renderCalendar() {
        document.getElementById('calMonthYear').textContent =
            `${MONTH_NAMES[currentMonth]} ${currentYear}`;

        const grid = document.getElementById('calendarGrid');
        let html = DAY_NAMES.map(d => `<div class="cal-day-header">${d}</div>`).join('');

        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const startDow = firstDay.getDay();
        const today = new Date();
        today.setHours(0,0,0,0);

        // Previous month fill
        const prevLast = new Date(currentYear, currentMonth, 0);
        for (let i = startDow - 1; i >= 0; i--) {
            const d = prevLast.getDate() - i;
            html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
        }

        // Current month
        for (let d = 1; d <= lastDay.getDate(); d++) {
            const date = new Date(currentYear, currentMonth, d);
            const dateStr = formatDate(date);
            const isToday = date.getTime() === today.getTime();
            const isWeekend = date.getDay() === 0 || date.getDay() === 6;
            const classes = ['cal-day'];
            if (isToday) classes.push('today');
            if (isWeekend) classes.push('weekend');

            const events = getFolgasForDate(dateStr);
            const teamFerias = getTeamFeriasForDate(dateStr);
            const coordEvents = getCoordFeriasForDate(dateStr);
            const statusIcons = { aguardando_substituto: '🔄', pendente: '⏳', aprovada: '✅', rejeitada: '❌' };
            const eventsHTML = events.map(e => {
                const s = e.status || 'pendente';
                return `<div class="cal-event person-${e.personIdx} ${s}" title="${state.team[e.personIdx].name} — ${s.charAt(0).toUpperCase() + s.slice(1)}${e.note ? ' - ' + e.note : ''}">
                    ${statusIcons[s]} ${state.team[e.personIdx].name.split(' ')[0]}
                    <button class="remove-event" onclick="event.stopPropagation(); removeFolga('${e.id}')">✕</button>
                </div>`;
            }).join('') + teamFerias.map(t =>
                `<div class="cal-event ferias person-${t.personIdx}" title="${t.name} — Férias">✈ ${t.name.split(' ')[0]}</div>`
            ).join('') + coordEvents.map(c =>
                `<div class="cal-event coord coord-${c.coordIdx}" title="${c.name} — Férias">${c.name.split(' ')[0]} ✈</div>`
            ).join('');

            html += `<div class="${classes.join(' ')}" onclick="quickAdd('${dateStr}')">
                <div class="cal-day-num">${d}</div>
                <div class="cal-events">${eventsHTML}</div>
            </div>`;
        }

        // Next month fill
        const remaining = 42 - (startDow + lastDay.getDate());
        for (let d = 1; d <= remaining; d++) {
            html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
        }

        grid.innerHTML = html;
    }

    function getFolgasForDate(dateStr) {
        return state.folgas.filter(f => {
            return dateStr >= f.startDate && dateStr <= f.endDate;
        });
    }

    function getCoordFeriasForDate(dateStr) {
        return COORD_FERIAS.filter(c => dateStr >= c.startDate && dateStr <= c.endDate);
    }

    function getTeamFeriasForDate(dateStr) {
        return TEAM_FERIAS.filter(t => dateStr >= t.startDate && dateStr <= t.endDate);
    }

    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function changeMonth(delta) {
        currentMonth += delta;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        renderCalendar();
    }

    // ── ADD FOLGA ──
    async function addFolga() {
        const personIdx = parseInt(document.getElementById('formPerson').value);
        const startDate = document.getElementById('formDateStart').value;
        const endDate = document.getElementById('formDateEnd').value || startDate;
        const note = document.getElementById('formNote').value.trim();

        if (!startDate) {
            showToast('Selecione uma data!', true);
            return;
        }
        if (endDate < startDate) {
            showToast('Data fim antes da data início!', true);
            return;
        }

        const folga = {
            id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
            personIdx,
            startDate,
            endDate: endDate || startDate,
            note,
            substituto: '',
            status: 'aguardando_substituto'
        };

        const days = countFolgaDays(folga);
        const hours = days * HOURS_PER_DAY;
        const available = getPersonAvailable(personIdx);

        if (hours > available) {
            showToast(`Saldo insuficiente! ${state.team[personIdx].name} tem ${available}h disponível, precisa de ${hours}h.`, true);
            return;
        }

        state.folgas.push(folga);
        renderAll();
        await saveState();

        // Reset form
        document.getElementById('formDateStart').value = '';
        document.getElementById('formDateEnd').value = '';
        document.getElementById('formNote').value = '';

        showToast(`Folga agendada: ${state.team[personIdx].name} — ${days} dia(s) (${hours}h)`);

        const person = state.team[personIdx];
        const dateLabel = folga.startDate === folga.endDate
            ? formatDateBR(folga.startDate)
            : `${formatDateBR(folga.startDate)} a ${formatDateBR(folga.endDate)}`;
        const sent = await sendEmail('solicitar_substituto', {
            to: EMAIL_CONFIG.arthurEmail,
            personName: person.name,
            dates: dateLabel,
            days: days,
            hours: hours,
            note: folga.note || '',
            portalURL: EMAIL_CONFIG.portalURL
        });
        if (sent) showToast('📧 Email enviado para Arthur solicitando substituto.');
    }

        const limit = new Date(today);
        limit.setDate(limit.getDate() + 30);
        const limitStr = formatDate(limit);

        const teamRelevant = TEAM_FERIAS.filter(t =>
            t.endDate >= todayStr && t.startDate <= limitStr
        ).sort((a, b) => a.startDate.localeCompare(b.startDate));

        const coordRelevant = COORD_FERIAS.filter(c =>
            c.endDate >= todayStr && c.startDate <= limitStr
        ).sort((a, b) => a.startDate.localeCompare(b.startDate));

        if (teamRelevant.length === 0 && coordRelevant.length === 0) {
            banner.style.display = 'none';
            return;
        }

        function chipLabel(startDate, endDate) {
            const start = new Date(startDate + 'T00:00:00');
            const end = new Date(endDate + 'T00:00:00');
            const active = today >= start && today <= end;
            return active ? 'Em férias' : `${formatDateBR(startDate)} → ${formatDateBR(endDate)}`;
        }

        banner.style.display = 'flex';
        banner.innerHTML = `<span class="coord-banner-label">✈ Férias</span>` +
            teamRelevant.map(t =>
                `<span class="coord-chip team-${t.personIdx}">
                    ${t.name} <span class="coord-chip-dates">${chipLabel(t.startDate, t.endDate)}</span>
                </span>`
            ).join('') +
            coordRelevant.map(c =>
                `<span class="coord-chip coord-${c.coordIdx}">
                    ${c.name} <span class="coord-chip-dates">${chipLabel(c.startDate, c.endDate)}</span>
                </span>`
            ).join('');
    }

    // ── MODAL ──
    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        document.getElementById('modalConfirm').style.display = '';
        document.querySelector('.btn-cancel').textContent = 'Cancelar';
    }

    function showPersonFolgas(idx, force = false) {
        if (!force && event && (event.target.tagName === 'INPUT' || event.target.tagName === 'BUTTON' || event.target.closest('.avatar'))) return;

        const p = state.team[idx];
        const folgas = getPersonFolgas(idx).sort((a, b) => a.startDate.localeCompare(b.startDate));
        const committed = getPersonCommitted(idx);
        const available = getPersonAvailable(idx);
        const colors = ['#6366f1', '#22c55e', '#f59e0b', '#3b82f6'];
        const color = colors[idx];

        const phModal = getPhoto(p);
        const photoHTML = phModal
            ? `<img src="${phModal}">`
            : '👤';

        const statsHTML = `
            <div class="person-modal-stats">
                <div class="pm-stat">
                    <div class="pm-stat-val" style="color: ${color}">${p.balance}h</div>
                    <div class="pm-stat-label">Saldo Total</div>
                </div>
                <div class="pm-stat">
                    <div class="pm-stat-val" style="color: var(--red)">${committed}h</div>
                    <div class="pm-stat-label">Comprometido</div>
                </div>
                <div class="pm-stat">
                    <div class="pm-stat-val" style="color: ${available >= 0 ? 'var(--green)' : 'var(--red)'}">${available}h</div>
                    <div class="pm-stat-label">Disponível</div>
                </div>
            </div>
        `;

        let folgasHTML;
        if (folgas.length === 0) {
            folgasHTML = `<div class="empty-state"><span>📭</span>Nenhuma folga agendada</div>`;
        } else {
            folgasHTML = `
                <div class="pm-section-title">Folgas Programadas (${folgas.length})</div>
                <div class="pm-folga-list">
                    ${folgas.map(f => {
                        const days = countFolgaDays(f);
                        const s = f.status || 'aguardando_substituto';
                        const dateLabel = f.startDate === f.endDate
                            ? formatDateBR(f.startDate)
                            : `${formatDateBR(f.startDate)} → ${formatDateBR(f.endDate)}`;
                        let modalActions = '';
                        if (s === 'aguardando_substituto') {
                            modalActions = substitutoFormModal(f.id, idx);
                        } else if (s === 'pendente') {
                            modalActions = `<div class="approval-actions">
                                <button class="btn-approve" onclick="event.stopPropagation(); approveFolgaFromModal('${f.id}', ${idx})" title="Aprovar">✓ Aprovar</button>
                                <button class="btn-reject" onclick="event.stopPropagation(); rejectFolgaFromModal('${f.id}', ${idx})" title="Rejeitar">✕ Rejeitar</button>
                            </div>`;
                        }
                        return `
                            <div class="pm-folga-item ${s}" style="border-left-color: ${color}">
                                <div class="pm-folga-top">
                                    <div>
                                        <div class="pm-folga-dates">${dateLabel}</div>
                                        ${f.note ? `<div class="pm-folga-note">${f.note}</div>` : ''}
                                        ${substitutoInfo(f)}
                                    </div>
                                    <div class="pm-folga-right">
                                        <div>
                                            <div class="pm-folga-days">${days} dia${days > 1 ? 's' : ''}</div>
                                            <div class="pm-folga-hours">-${days * HOURS_PER_DAY}h</div>
                                        </div>
                                        <button class="pm-folga-remove" onclick="removeFolgaFromModal('${f.id}', ${idx})" title="Remover">✕</button>
                                    </div>
                                </div>
                                <div class="pm-folga-status-row">
                                    ${statusLabel(s)}
                                    ${modalActions}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        document.getElementById('modalTitle').innerHTML = `
            <div class="person-modal-header">
                <div class="person-modal-avatar">${photoHTML}</div>
                <div>
                    <div class="person-modal-name">${p.name}</div>
                    <div class="person-modal-role">${p.role}</div>
                </div>
            </div>
        `;
        document.getElementById('modalBody').innerHTML = statsHTML + folgasHTML;
        document.getElementById('modalConfirm').style.display = 'none';
        document.querySelector('.btn-cancel').textContent = 'Fechar';
        document.getElementById('modalOverlay').classList.add('active');
    }

    async function removeFolgaFromModal(id, personIdx) {
        state.folgas = state.folgas.filter(f => f.id !== id);
        renderAll();
        await saveState();
        showPersonFolgas(personIdx, true);
        showToast('Folga removida.');
    }

    async function approveFolgaFromModal(id, personIdx) {
        await approveFolga(id);
        showPersonFolgas(personIdx, true);
    }

    async function rejectFolgaFromModal(id, personIdx) {
        await rejectFolga(id);
        showPersonFolgas(personIdx, true);
    }

    // ── TOAST ──
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast show' + (isError ? ' error' : '');
        setTimeout(() => toast.className = 'toast', 3000);
    }

    // ── DATE DISPLAY ──
    function updateDateDisplay() {
        const now = new Date();
        const options = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
        document.getElementById('currentDate').textContent =
            now.toLocaleDateString('pt-BR', options).replace(/^\w/, c => c.toUpperCase());
    }

    // ── RENDER ALL ──
    function renderAll() {
        renderTeam();
        renderSummary();
        renderCalendar();
        renderUpcoming();
        renderCoordFerias();
        renderCoordBanner();
    }

    // ── CROP EDITOR ──
    let cropState = { idx: -1, imgSrc: '', x: 0, y: 0, scale: 1, baseScale: 1, dragging: false, startX: 0, startY: 0 };

    function openCropEditor(idx, imgSrc) {
        cropState.idx = idx;
        cropState.imgSrc = imgSrc;

        const img = document.getElementById('cropImage');
        const area = document.getElementById('cropArea');

        img.onload = () => {
            const areaSize = 280;
            const fitScale = Math.max(areaSize / img.naturalWidth, areaSize / img.naturalHeight);
            cropState.baseScale = fitScale;
            cropState.scale = fitScale;
            cropState.x = (areaSize - img.naturalWidth * fitScale) / 2;
            cropState.y = (areaSize - img.naturalHeight * fitScale) / 2;

            const slider = document.getElementById('cropZoomSlider');
            slider.min = (fitScale * 0.5).toFixed(4);
            slider.max = (fitScale * 4).toFixed(4);
            slider.step = (fitScale * 0.02).toFixed(4);
            slider.value = fitScale;

            updateCropTransform();
        };
        img.src = imgSrc;

        document.getElementById('cropOverlay').classList.add('active');

        area.onpointerdown = (e) => {
            cropState.dragging = true;
            cropState.startX = e.clientX - cropState.x;
            cropState.startY = e.clientY - cropState.y;
            area.setPointerCapture(e.pointerId);
        };
        area.onpointermove = (e) => {
            if (!cropState.dragging) return;
            cropState.x = e.clientX - cropState.startX;
            cropState.y = e.clientY - cropState.startY;
            updateCropTransform();
        };
        area.onpointerup = () => { cropState.dragging = false; };
    }

    function updateCropTransform() {
        document.getElementById('cropImage').style.transform =
            `translate(${cropState.x}px, ${cropState.y}px) scale(${cropState.scale})`;
    }

    function cropZoom(direction) {
        const slider = document.getElementById('cropZoomSlider');
        const min = parseFloat(slider.min);
        const max = parseFloat(slider.max);
        const step = (max - min) * 0.05;
        const newScale = Math.max(min, Math.min(max, cropState.scale + direction * step));
        slider.value = newScale;
        cropZoomTo(newScale);
    }

    function cropZoomTo(val) {
        const newScale = parseFloat(val);
        const cx = 140, cy = 140;
        const ratio = newScale / cropState.scale;
        cropState.x = cx - ratio * (cx - cropState.x);
        cropState.y = cy - ratio * (cy - cropState.y);
        cropState.scale = newScale;
        updateCropTransform();
    }

    function closeCropEditor() {
        document.getElementById('cropOverlay').classList.remove('active');
    }

    function triggerCropFileInput() {
        document.getElementById('cropFileInput').click();
    }

    function handleCropFileSelect(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            openCropEditor(cropState.idx, e.target.result);
        };
        reader.readAsDataURL(file);
        input.value = '';
    }

    function confirmCrop() {
        const areaSize = 280;
        const outputSize = 200;
        const canvas = document.createElement('canvas');
        canvas.width = outputSize;
        canvas.height = outputSize;
        const ctx = canvas.getContext('2d');

        const r = outputSize / areaSize;
        const img = document.getElementById('cropImage');
        ctx.drawImage(
            img,
            cropState.x * r,
            cropState.y * r,
            img.naturalWidth * cropState.scale * r,
            img.naturalHeight * cropState.scale * r
        );

        state.team[cropState.idx].photo = canvas.toDataURL('image/jpeg', 0.85);
        state.team[cropState.idx].photoOriginal = cropState.imgSrc;
        saveState();
        renderAll();
        closeCropEditor();
        showToast('Foto atualizada!');
    }

    // ── INIT ──
    updateDateDisplay();
    if (getAdminToken()) { isAdmin = true; updateAdminUI(); }
    (async () => {
        state = await loadStateFromServer();
        renderAll();
    })();
</script>
