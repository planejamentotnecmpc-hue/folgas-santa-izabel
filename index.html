<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programação de Folgas - Santa Izabel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232736;
            --border: #2e3348;
            --text: #e8eaed;
            --text2: #9ca3af;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, 0.12);
            --amber: #f59e0b;
            --amber-bg: rgba(245, 158, 11, 0.12);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.12);
            --blue: #3b82f6;
            --blue-bg: rgba(59, 130, 246, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            padding: 28px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-left { display: flex; align-items: center; gap: 20px; z-index: 1; }
        .header-icon {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            backdrop-filter: blur(10px);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .header h1 span {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255,255,255,0.6);
            margin-top: 3px;
        }
        .header-right { z-index: 1; display: flex; align-items: center; gap: 16px; }
        .current-date {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.08);
            padding: 8px 16px;
            border-radius: 8px;
        }

        /* ── SUMMARY CARDS ── */
        .summary-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 24px 40px;
        }
        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .summary-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .summary-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .summary-icon.people { background: var(--blue-bg); }
        .summary-icon.hours { background: var(--green-bg); }
        .summary-icon.scheduled { background: var(--amber-bg); }
        .summary-icon.used { background: var(--red-bg); }
        .summary-info { }
        .summary-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .summary-value { font-size: 28px; font-weight: 700; margin-top: 2px; letter-spacing: -1px; }
        .summary-value.blue { color: var(--blue); }
        .summary-value.green { color: var(--green); }
        .summary-value.amber { color: var(--amber); }
        .summary-value.red { color: var(--red); }

        /* ── MAIN GRID ── */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 40px 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* ── TEAM CARDS ── */
        .team-section {
            grid-column: 1 / -1;
        }
        .team-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .team-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .team-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
        }
        .team-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .team-card:nth-child(1)::before { background: linear-gradient(90deg, #6366f1, #818cf8); }
        .team-card:nth-child(2)::before { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .team-card:nth-child(3)::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .team-card:nth-child(4)::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }

        .avatar-container {
            width: 90px; height: 90px;
            margin: 0 auto 14px;
            position: relative;
        }
        .avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border);
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .avatar:hover { border-color: var(--accent); }
        .avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .avatar .placeholder {
            font-size: 36px;
            color: var(--text2);
        }
        .avatar input[type="file"] {
            display: none;
        }
        .status-dot {
            position: absolute;
            bottom: 4px; right: 4px;
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 3px solid var(--surface);
        }
        .status-dot.online { background: var(--green); }
        .status-dot.away { background: var(--amber); }
        .status-dot.off { background: var(--red); }

        .team-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
            outline: none;
            background: transparent;
            color: var(--text);
            text-align: center;
            width: 100%;
        }
        .team-name:hover { border-color: var(--border); }
        .team-name:focus { border-color: var(--accent); background: var(--surface2); }

        .team-role {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
            outline: none;
            background: transparent;
            text-align: center;
            width: 100%;
            font-family: inherit;
        }
        .team-role:hover { border-color: var(--border); }
        .team-role:focus { border-color: var(--accent); background: var(--surface2); }

        .balance-display {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
        }
        .balance-label {
            font-size: 11px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .balance-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .balance-input {
            font-size: 32px;
            font-weight: 800;
            background: transparent;
            border: none;
            color: var(--text);
            width: 90px;
            text-align: center;
            outline: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .balance-input:focus { border-bottom-color: var(--accent); }
        .balance-unit {
            font-size: 14px;
            color: var(--text2);
            font-weight: 500;
        }
        .balance-bar-track {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        .balance-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .scheduled-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text2);
            padding: 0 4px;
        }
        .scheduled-info .val { color: var(--text); font-weight: 600; }

        /* ── CALENDAR ── */
        .calendar-section { grid-column: 1 / -1; }
        .calendar-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
        }
        .calendar-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cal-nav-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px; height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
        }
        .cal-nav-btn:hover { background: var(--accent); border-color: var(--accent); }
        .cal-month-year {
            font-size: 18px;
            font-weight: 600;
            min-width: 200px;
            text-align: center;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .cal-day-header {
            padding: 12px;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }
        .cal-day {
            min-height: 90px;
            padding: 8px;
            border: 1px solid rgba(46, 51, 72, 0.5);
            position: relative;
            cursor: pointer;
            transition: background 0.15s;
        }
        .cal-day:hover { background: var(--surface2); }
        .cal-day.other-month { opacity: 0.3; }
        .cal-day.today {
            background: var(--accent-glow);
        }
        .cal-day.today .cal-day-num {
            background: var(--accent);
            color: white;
            border-radius: 50%;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
        }
        .cal-day.weekend { background: rgba(255,255,255,0.02); }
        .cal-day-num {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text2);
        }
        .cal-day.today .cal-day-num { color: white; }
        .cal-events {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .cal-event {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
            cursor: pointer;
            position: relative;
        }
        .cal-event:hover { filter: brightness(1.2); }
        .cal-event.person-0 { background: rgba(99,102,241,0.25); color: #a5b4fc; border-left: 2px solid #6366f1; }
        .cal-event.person-1 { background: rgba(34,197,94,0.25); color: #86efac; border-left: 2px solid #22c55e; }
        .cal-event.person-2 { background: rgba(245,158,11,0.25); color: #fde68a; border-left: 2px solid #f59e0b; }
        .cal-event.person-3 { background: rgba(59,130,246,0.25); color: #93c5fd; border-left: 2px solid #3b82f6; }
        .cal-event .remove-event {
            position: absolute;
            right: 2px; top: 50%;
            transform: translateY(-50%);
            display: none;
            background: rgba(239,68,68,0.8);
            color: white;
            border: none;
            border-radius: 3px;
            width: 14px; height: 14px;
            font-size: 10px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .cal-event:hover .remove-event { display: flex; }

        /* ── SCHEDULE PANEL (RIGHT SIDEBAR) ── */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 40px 30px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        /* ── ADD FOLGA FORM ── */
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-label {
            font-size: 12px;
            color: var(--text2);
            font-weight: 500;
        }
        .form-select, .form-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-select:focus, .form-input:focus { border-color: var(--accent); }
        .form-select option { background: var(--surface); }

        .btn-add {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
            width: 100%;
            margin-top: 6px;
        }
        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }
        .btn-add:active { transform: scale(0.98); }

        /* ── UPCOMING LIST ── */
        .upcoming-list {
            max-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .upcoming-list::-webkit-scrollbar { width: 4px; }
        .upcoming-list::-webkit-scrollbar-track { background: transparent; }
        .upcoming-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .upcoming-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            border-left: 3px solid;
            transition: background 0.15s;
        }
        .upcoming-item:hover { background: rgba(255,255,255,0.05); }
        .upcoming-item.person-0 { border-left-color: #6366f1; }
        .upcoming-item.person-1 { border-left-color: #22c55e; }
        .upcoming-item.person-2 { border-left-color: #f59e0b; }
        .upcoming-item.person-3 { border-left-color: #3b82f6; }

        .upcoming-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--surface);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            overflow: hidden;
        }
        .upcoming-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .upcoming-info { flex: 1; }
        .upcoming-name { font-size: 13px; font-weight: 600; }
        .upcoming-date { font-size: 11px; color: var(--text2); margin-top: 1px; }
        .upcoming-hours {
            font-size: 13px;
            font-weight: 700;
            color: var(--red);
        }
        .upcoming-remove {
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }
        .upcoming-remove:hover { background: var(--red-bg); color: var(--red); }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            width: 520px;
            max-width: 90%;
        }
        .modal h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-cancel {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-confirm {
            flex: 1;
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        /* ── PERSON MODAL ── */
        .person-modal-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .person-modal-avatar {
            width: 56px; height: 56px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .person-modal-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .person-modal-name { font-size: 18px; font-weight: 700; }
        .person-modal-role { font-size: 12px; color: var(--text2); margin-top: 2px; }
        .person-modal-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .pm-stat {
            background: var(--surface2);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .pm-stat-val { font-size: 22px; font-weight: 700; }
        .pm-stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .pm-folga-list {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pm-folga-list::-webkit-scrollbar { width: 4px; }
        .pm-folga-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .pm-folga-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--surface2);
            border-radius: 10px;
            border-left: 3px solid;
        }
        .pm-folga-dates { font-size: 13px; font-weight: 600; }
        .pm-folga-note { font-size: 11px; color: var(--text2); margin-top: 2px; }
        .pm-folga-right { text-align: right; display: flex; align-items: center; gap: 10px; }
        .pm-folga-days { font-size: 13px; font-weight: 600; }
        .pm-folga-hours { font-size: 11px; color: var(--red); font-weight: 600; }
        .pm-folga-remove {
            background: none; border: none; color: var(--text2);
            cursor: pointer; font-size: 14px; padding: 4px 6px;
            border-radius: 6px; transition: background 0.15s, color 0.15s;
        }
        .pm-folga-remove:hover { background: var(--red-bg); color: var(--red); }
        .pm-section-title {
            font-size: 12px; color: var(--text2); text-transform: uppercase;
            letter-spacing: 0.5px; font-weight: 600; margin-bottom: 10px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text2);
            font-size: 13px;
        }
        .empty-state span { font-size: 32px; display: block; margin-bottom: 8px; }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--green);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 2000;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.error { background: var(--red); }

        /* ── RESPONSIVE ── */
        @media (max-width: 1200px) {
            .team-grid { grid-template-columns: repeat(2, 1fr); }
            .summary-bar { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .header { padding: 20px; }
            .summary-bar, .main-grid, .bottom-grid { padding: 0 20px 20px; }
            .summary-bar { grid-template-columns: 1fr; }
            .team-grid { grid-template-columns: 1fr; }
            .main-grid, .bottom-grid { grid-template-columns: 1fr; }
        }

        /* ── PRINT ── */
        @media print {
            body { background: white; color: #1a1a1a; }
            .header { background: #1e1b4b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .btn-add, .btn-cancel, .btn-confirm, .upcoming-remove, .remove-event { display: none !important; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <div class="header-icon">📅</div>
        <h1>
            Programação de Folgas - Santa Izabel
            <span>Gestão de Horas e Folgas do Time</span>
        </h1>
    </div>
    <div class="header-right">
        <div class="current-date" id="currentDate"></div>
    </div>
</div>

<!-- SUMMARY CARDS -->
<div class="summary-bar">
    <div class="summary-card">
        <div class="summary-icon people">👥</div>
        <div class="summary-info">
            <div class="summary-label">Colaboradores</div>
            <div class="summary-value blue">4</div>
        </div>
    </div>
    <div class="summary-card">
        <div class="summary-icon hours">⏱️</div>
        <div class="summary-info">
            <div class="summary-label">Saldo Total</div>
            <div class="summary-value green" id="totalBalance">0h</div>
        </div>
    </div>
    <div class="summary-card">
        <div class="summary-icon scheduled">📋</div>
        <div class="summary-info">
            <div class="summary-label">Folgas Agendadas</div>
            <div class="summary-value amber" id="totalScheduled">0</div>
        </div>
    </div>
    <div class="summary-card">
        <div class="summary-icon used">📉</div>
        <div class="summary-info">
            <div class="summary-label">Horas Comprometidas</div>
            <div class="summary-value red" id="totalCommitted">0h</div>
        </div>
    </div>
</div>

<!-- TEAM CARDS -->
<div class="main-grid">
    <div class="team-section">
        <div class="section-title">Equipe</div>
        <div class="team-grid" id="teamGrid"></div>
    </div>

    <!-- CALENDAR -->
    <div class="calendar-section">
        <div class="section-title">Calendário de Folgas</div>
        <div class="calendar-container">
            <div class="calendar-header">
                <div class="calendar-nav">
                    <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
                    <div class="cal-month-year" id="calMonthYear"></div>
                    <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>
</div>

<!-- BOTTOM: FORM + UPCOMING -->
<div class="bottom-grid">
    <div class="panel">
        <div class="section-title">Agendar Folga</div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Colaborador</label>
                <select class="form-select" id="formPerson"></select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Data Início</label>
                <input type="date" class="form-input" id="formDateStart">
            </div>
            <div class="form-group">
                <label class="form-label">Data Fim</label>
                <input type="date" class="form-input" id="formDateEnd">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Observação (opcional)</label>
                <input type="text" class="form-input" id="formNote" placeholder="Ex: Viagem, consulta médica...">
            </div>
        </div>
        <button class="btn-add" onclick="addFolga()">Agendar Folga</button>
    </div>

    <div class="panel">
        <div class="section-title">Próximas Folgas</div>
        <div class="upcoming-list" id="upcomingList">
            <div class="empty-state">
                <span>📭</span>
                Nenhuma folga agendada
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3 id="modalTitle">Agendar Folga</h3>
        <div id="modalBody"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-confirm" id="modalConfirm">Confirmar</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    // ── DATA ──
    const STORAGE_KEY = 'folgas_santa_izabel';
    const HOURS_PER_DAY = 8;

    let state = loadState();
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    function defaultState() {
        return {
            team: [
                { name: 'Colaborador 1', role: 'Cargo', balance: 0, photo: null },
                { name: 'Colaborador 2', role: 'Cargo', balance: 0, photo: null },
                { name: 'Colaborador 3', role: 'Cargo', balance: 0, photo: null },
                { name: 'Colaborador 4', role: 'Cargo', balance: 0, photo: null },
            ],
            folgas: []
        };
    }

    function loadState() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) return JSON.parse(saved);
        } catch(e) {}
        return defaultState();
    }

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    // ── COMPUTED ──
    function getPersonFolgas(idx) {
        return state.folgas.filter(f => f.personIdx === idx);
    }

    function countFolgaDays(folga) {
        const start = new Date(folga.startDate + 'T00:00:00');
        const end = new Date(folga.endDate + 'T00:00:00');
        let days = 0;
        let d = new Date(start);
        while (d <= end) {
            const dow = d.getDay();
            if (dow !== 0 && dow !== 6) days++;
            d.setDate(d.getDate() + 1);
        }
        return days;
    }

    function getPersonCommitted(idx) {
        return getPersonFolgas(idx).reduce((sum, f) => sum + countFolgaDays(f) * HOURS_PER_DAY, 0);
    }

    function getPersonAvailable(idx) {
        return state.team[idx].balance - getPersonCommitted(idx);
    }

    // ── RENDER TEAM CARDS ──
    function renderTeam() {
        const grid = document.getElementById('teamGrid');
        const colors = ['#6366f1', '#22c55e', '#f59e0b', '#3b82f6'];
        const barColors = [
            'linear-gradient(90deg, #6366f1, #818cf8)',
            'linear-gradient(90deg, #22c55e, #4ade80)',
            'linear-gradient(90deg, #f59e0b, #fbbf24)',
            'linear-gradient(90deg, #3b82f6, #60a5fa)',
        ];

        grid.innerHTML = state.team.map((p, i) => {
            const committed = getPersonCommitted(i);
            const available = getPersonAvailable(i);
            const folgaCount = getPersonFolgas(i).length;
            const pct = p.balance > 0 ? Math.max(0, Math.min(100, (available / p.balance) * 100)) : 0;
            const statusClass = available > 40 ? 'online' : available > 0 ? 'away' : 'off';
            const photoHTML = p.photo
                ? `<img src="${p.photo}" alt="${p.name}">`
                : `<span class="placeholder">👤</span>`;

            return `
                <div class="team-card" onclick="showPersonFolgas(${i})" style="cursor:pointer">
                    <div class="avatar-container">
                        <div class="avatar" onclick="triggerPhotoUpload(${i})">
                            ${photoHTML}
                            <input type="file" accept="image/*" id="photoInput${i}" onchange="handlePhoto(${i}, this)">
                        </div>
                        <div class="status-dot ${statusClass}"></div>
                    </div>
                    <input class="team-name" value="${p.name}"
                           onchange="updateName(${i}, this.value)"
                           onfocus="this.select()">
                    <input class="team-role" value="${p.role}"
                           onchange="updateRole(${i}, this.value)"
                           onfocus="this.select()">
                    <div class="balance-display">
                        <div class="balance-label">Saldo de Horas</div>
                        <div class="balance-row">
                            <input class="balance-input" type="number" value="${p.balance}"
                                   onchange="updateBalance(${i}, this.value)"
                                   onfocus="this.select()"
                                   style="color: ${colors[i]}">
                            <span class="balance-unit">horas</span>
                        </div>
                        <div class="balance-bar-track">
                            <div class="balance-bar-fill" style="width: ${pct}%; background: ${barColors[i]}"></div>
                        </div>
                    </div>
                    <div class="scheduled-info">
                        <span>Agendadas: <span class="val">${folgaCount}</span></span>
                        <span>Disponível: <span class="val" style="color: ${available >= 0 ? colors[i] : '#ef4444'}">${available}h</span></span>
                    </div>
                </div>
            `;
        }).join('');

        // Update form select
        const select = document.getElementById('formPerson');
        select.innerHTML = state.team.map((p, i) =>
            `<option value="${i}">${p.name}</option>`
        ).join('');
    }

    function triggerPhotoUpload(idx) {
        document.getElementById(`photoInput${idx}`).click();
    }

    function handlePhoto(idx, input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            state.team[idx].photo = e.target.result;
            saveState();
            renderAll();
            showToast('Foto atualizada!');
        };
        reader.readAsDataURL(file);
    }

    function updateName(idx, name) {
        state.team[idx].name = name || `Colaborador ${idx + 1}`;
        saveState();
        renderAll();
    }

    function updateRole(idx, role) {
        state.team[idx].role = role || 'Cargo';
        saveState();
        renderAll();
    }

    function updateBalance(idx, val) {
        state.team[idx].balance = parseInt(val) || 0;
        saveState();
        renderAll();
    }

    // ── SUMMARY ──
    function renderSummary() {
        const totalBal = state.team.reduce((s, p) => s + p.balance, 0);
        const totalSched = state.folgas.length;
        const totalComm = state.team.reduce((s, _, i) => s + getPersonCommitted(i), 0);

        document.getElementById('totalBalance').textContent = totalBal + 'h';
        document.getElementById('totalScheduled').textContent = totalSched;
        document.getElementById('totalCommitted').textContent = totalComm + 'h';
    }

    // ── CALENDAR ──
    const MONTH_NAMES = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                         'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
    const DAY_NAMES = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    function renderCalendar() {
        document.getElementById('calMonthYear').textContent =
            `${MONTH_NAMES[currentMonth]} ${currentYear}`;

        const grid = document.getElementById('calendarGrid');
        let html = DAY_NAMES.map(d => `<div class="cal-day-header">${d}</div>`).join('');

        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const startDow = firstDay.getDay();
        const today = new Date();
        today.setHours(0,0,0,0);

        // Previous month fill
        const prevLast = new Date(currentYear, currentMonth, 0);
        for (let i = startDow - 1; i >= 0; i--) {
            const d = prevLast.getDate() - i;
            html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
        }

        // Current month
        for (let d = 1; d <= lastDay.getDate(); d++) {
            const date = new Date(currentYear, currentMonth, d);
            const dateStr = formatDate(date);
            const isToday = date.getTime() === today.getTime();
            const isWeekend = date.getDay() === 0 || date.getDay() === 6;
            const classes = ['cal-day'];
            if (isToday) classes.push('today');
            if (isWeekend) classes.push('weekend');

            const events = getFolgasForDate(dateStr);
            const eventsHTML = events.map(e =>
                `<div class="cal-event person-${e.personIdx}" title="${state.team[e.personIdx].name}${e.note ? ' - ' + e.note : ''}">
                    ${state.team[e.personIdx].name.split(' ')[0]}
                    <button class="remove-event" onclick="event.stopPropagation(); removeFolga('${e.id}')">✕</button>
                </div>`
            ).join('');

            html += `<div class="${classes.join(' ')}" onclick="quickAdd('${dateStr}')">
                <div class="cal-day-num">${d}</div>
                <div class="cal-events">${eventsHTML}</div>
            </div>`;
        }

        // Next month fill
        const remaining = 42 - (startDow + lastDay.getDate());
        for (let d = 1; d <= remaining; d++) {
            html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
        }

        grid.innerHTML = html;
    }

    function getFolgasForDate(dateStr) {
        return state.folgas.filter(f => {
            return dateStr >= f.startDate && dateStr <= f.endDate;
        });
    }

    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function changeMonth(delta) {
        currentMonth += delta;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        renderCalendar();
    }

    // ── ADD FOLGA ──
    function addFolga() {
        const personIdx = parseInt(document.getElementById('formPerson').value);
        const startDate = document.getElementById('formDateStart').value;
        const endDate = document.getElementById('formDateEnd').value || startDate;
        const note = document.getElementById('formNote').value.trim();

        if (!startDate) {
            showToast('Selecione uma data!', true);
            return;
        }
        if (endDate < startDate) {
            showToast('Data fim antes da data início!', true);
            return;
        }

        const folga = {
            id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
            personIdx,
            startDate,
            endDate: endDate || startDate,
            note
        };

        const days = countFolgaDays(folga);
        const hours = days * HOURS_PER_DAY;
        const available = getPersonAvailable(personIdx);

        if (hours > available) {
            showToast(`Saldo insuficiente! ${state.team[personIdx].name} tem ${available}h disponível, precisa de ${hours}h.`, true);
            return;
        }

        state.folgas.push(folga);
        saveState();
        renderAll();

        // Reset form
        document.getElementById('formDateStart').value = '';
        document.getElementById('formDateEnd').value = '';
        document.getElementById('formNote').value = '';

        showToast(`Folga agendada: ${state.team[personIdx].name} — ${days} dia(s) (${hours}h)`);
    }

    function quickAdd(dateStr) {
        document.getElementById('formDateStart').value = dateStr;
        document.getElementById('formDateEnd').value = dateStr;
        document.getElementById('formPerson').focus();
        document.querySelector('.bottom-grid').scrollIntoView({ behavior: 'smooth' });
    }

    function removeFolga(id) {
        const folga = state.folgas.find(f => f.id === id);
        if (!folga) return;
        state.folgas = state.folgas.filter(f => f.id !== id);
        saveState();
        renderAll();
        showToast('Folga removida.');
    }

    // ── UPCOMING LIST ──
    function renderUpcoming() {
        const list = document.getElementById('upcomingList');
        const today = formatDate(new Date());
        const upcoming = state.folgas
            .filter(f => f.endDate >= today)
            .sort((a, b) => a.startDate.localeCompare(b.startDate));

        if (upcoming.length === 0) {
            list.innerHTML = `<div class="empty-state"><span>📭</span>Nenhuma folga agendada</div>`;
            return;
        }

        list.innerHTML = upcoming.map(f => {
            const p = state.team[f.personIdx];
            const days = countFolgaDays(f);
            const photoHTML = p.photo
                ? `<img src="${p.photo}">`
                : '👤';
            const dateLabel = f.startDate === f.endDate
                ? formatDateBR(f.startDate)
                : `${formatDateBR(f.startDate)} → ${formatDateBR(f.endDate)}`;

            return `
                <div class="upcoming-item person-${f.personIdx}">
                    <div class="upcoming-avatar">${photoHTML}</div>
                    <div class="upcoming-info">
                        <div class="upcoming-name">${p.name}</div>
                        <div class="upcoming-date">${dateLabel}${f.note ? ' · ' + f.note : ''}</div>
                    </div>
                    <div class="upcoming-hours">-${days * HOURS_PER_DAY}h</div>
                    <button class="upcoming-remove" onclick="removeFolga('${f.id}')" title="Remover">✕</button>
                </div>
            `;
        }).join('');
    }

    function formatDateBR(dateStr) {
        const [y, m, d] = dateStr.split('-');
        return `${d}/${m}/${y}`;
    }

    // ── MODAL ──
    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        document.getElementById('modalConfirm').style.display = '';
        document.querySelector('.btn-cancel').textContent = 'Cancelar';
    }

    function showPersonFolgas(idx) {
        if (event && (event.target.tagName === 'INPUT' || event.target.tagName === 'BUTTON' || event.target.closest('.avatar'))) return;

        const p = state.team[idx];
        const folgas = getPersonFolgas(idx).sort((a, b) => a.startDate.localeCompare(b.startDate));
        const committed = getPersonCommitted(idx);
        const available = getPersonAvailable(idx);
        const colors = ['#6366f1', '#22c55e', '#f59e0b', '#3b82f6'];
        const color = colors[idx];

        const photoHTML = p.photo
            ? `<img src="${p.photo}">`
            : '👤';

        const statsHTML = `
            <div class="person-modal-stats">
                <div class="pm-stat">
                    <div class="pm-stat-val" style="color: ${color}">${p.balance}h</div>
                    <div class="pm-stat-label">Saldo Total</div>
                </div>
                <div class="pm-stat">
                    <div class="pm-stat-val" style="color: var(--red)">${committed}h</div>
                    <div class="pm-stat-label">Comprometido</div>
                </div>
                <div class="pm-stat">
                    <div class="pm-stat-val" style="color: ${available >= 0 ? 'var(--green)' : 'var(--red)'}">${available}h</div>
                    <div class="pm-stat-label">Disponível</div>
                </div>
            </div>
        `;

        let folgasHTML;
        if (folgas.length === 0) {
            folgasHTML = `<div class="empty-state"><span>📭</span>Nenhuma folga agendada</div>`;
        } else {
            folgasHTML = `
                <div class="pm-section-title">Folgas Programadas (${folgas.length})</div>
                <div class="pm-folga-list">
                    ${folgas.map(f => {
                        const days = countFolgaDays(f);
                        const dateLabel = f.startDate === f.endDate
                            ? formatDateBR(f.startDate)
                            : `${formatDateBR(f.startDate)} → ${formatDateBR(f.endDate)}`;
                        return `
                            <div class="pm-folga-item" style="border-left-color: ${color}">
                                <div>
                                    <div class="pm-folga-dates">${dateLabel}</div>
                                    ${f.note ? `<div class="pm-folga-note">${f.note}</div>` : ''}
                                </div>
                                <div class="pm-folga-right">
                                    <div>
                                        <div class="pm-folga-days">${days} dia${days > 1 ? 's' : ''}</div>
                                        <div class="pm-folga-hours">-${days * HOURS_PER_DAY}h</div>
                                    </div>
                                    <button class="pm-folga-remove" onclick="removeFolgaFromModal('${f.id}', ${idx})" title="Remover">✕</button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        document.getElementById('modalTitle').innerHTML = `
            <div class="person-modal-header">
                <div class="person-modal-avatar">${photoHTML}</div>
                <div>
                    <div class="person-modal-name">${p.name}</div>
                    <div class="person-modal-role">${p.role}</div>
                </div>
            </div>
        `;
        document.getElementById('modalBody').innerHTML = statsHTML + folgasHTML;
        document.getElementById('modalConfirm').style.display = 'none';
        document.querySelector('.btn-cancel').textContent = 'Fechar';
        document.getElementById('modalOverlay').classList.add('active');
    }

    function removeFolgaFromModal(id, personIdx) {
        state.folgas = state.folgas.filter(f => f.id !== id);
        saveState();
        renderAll();
        showPersonFolgas(personIdx);
        showToast('Folga removida.');
    }

    // ── TOAST ──
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast show' + (isError ? ' error' : '');
        setTimeout(() => toast.className = 'toast', 3000);
    }

    // ── DATE DISPLAY ──
    function updateDateDisplay() {
        const now = new Date();
        const options = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
        document.getElementById('currentDate').textContent =
            now.toLocaleDateString('pt-BR', options).replace(/^\w/, c => c.toUpperCase());
    }

    // ── RENDER ALL ──
    function renderAll() {
        renderTeam();
        renderSummary();
        renderCalendar();
        renderUpcoming();
    }

    // ── INIT ──
    updateDateDisplay();
    renderAll();
</script>
</body>
</html>
